<!DOCTYPE html>
<html lang="en" class="drac-bg-black">
  <head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta content="utf-8" http-equiv="encoding" />

    <!-- Bootstrap 5: Required meta tags for proper responsive behaviors -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      NOTE: These tags live here, in the static html, and NOT in a react-helmet
            <Head/>. Social & search crawlers do not run our JavaScript, so any
            tag that react-helmet injects at runtime is invisible to them.
            react-helmet is still used for the per route <title>.
    -->
    <title>ICGPT - the OG of on-chain LLMs</title>
    <meta
      name="description"
      content="ICGPT - the OG of on-chain LLMs. Released in September 2023 as the very first app to run LLM inference on-chain, and serving on-chain LLMs on the Internet Computer ever since."
    />
    <meta
      name="keywords"
      content="on-chain LLM, on-chain AI, Internet Computer, ICP, GPT, AI, LLM, llama.cpp"
    />
    <meta name="author" content="icppWorld" />
    <link rel="canonical" href="https://icgpt.onicai.com/" />
    <link rel="icon" href="favicon.ico" />

    <!-- Open Graph: LinkedIn, Facebook, OpenChat, Discord, ... -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ICGPT" />
    <meta property="og:url" content="https://icgpt.onicai.com/" />
    <meta property="og:title" content="ICGPT - the OG of on-chain LLMs" />
    <meta
      property="og:description"
      content="Released in September 2023 as the very first app to run LLM inference on-chain. Chat with LLMs running entirely inside Internet Computer canisters."
    />
    <meta property="og:image" content="https://icgpt.onicai.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="ICGPT - the OG of on-chain LLMs" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@onicaiHQ" />
    <meta name="twitter:title" content="ICGPT - the OG of on-chain LLMs" />
    <meta
      name="twitter:description"
      content="Released in September 2023 as the very first app to run LLM inference on-chain. Chat with LLMs running entirely inside Internet Computer canisters."
    />
    <meta
      name="twitter:image"
      content="https://icgpt.onicai.com/og-image.png"
    />
    <meta name="twitter:image:alt" content="ICGPT - the OG of on-chain LLMs" />
  </head>

  <body class="drac-bg-black">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
